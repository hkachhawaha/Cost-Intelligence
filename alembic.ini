# Alembic config for Terzo Cost Intelligence.
# Run from the repo root:  uv run alembic upgrade head
[alembic]
script_location = migrations
# Make the `app` package (apps/api/app) importable from env.py.
prepend_sys_path = apps/api
# Migration filenames: 001_initial_schema.py (numeric prefix, no date).
file_template = %%(rev)s_%%(slug)s
path_separator = os

# sqlalchemy.url is set in env.py from app settings (DATABASE_URL → sync driver),
# so DB config lives in exactly one place.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
