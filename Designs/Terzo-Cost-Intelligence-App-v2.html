const STOP=new Set(['inc','llc','ltd','co','corp','company','group','the','holdings']);
const norm=s=>s.toLowerCase().replace(/&/g,' and ').replace(/[^a-z0-9 ]/g,' ').split(/\s+/).filter(t=>t&&!STOP.has(t));
function tokenSim(a,b){const A=norm(a),B=norm(b);if(!A.length||!B.length)return 0;let m=0;const u=new Array(B.length).fill(false);A.forEach(ta=>{for(let j=0;j<B.length;j++){if(u[j])continue;const tb=B[j];if(ta===tb||(ta.length>=4&&tb.length>=4&&(ta.startsWith(tb)||tb.startsWith(ta)))){u[j]=true;m++;break;}}});return m/Math.max(A.length,B.length);}
function matchOne(s){
  if(s.po){const c=contracts.find(c=>c.po===s.po);if(c)return{contractId:c.id,method:'PO',confidence:0.97};}
  let best=null,sc=0;contracts.forEach(c=>{const ex=norm(s.vendor).join(' ')===norm(c.vendor).join(' ');const sim=ex?1:tokenSim(s.vendor,c.vendor);if(sim>sc){sc=sim;best=c;}});
  if(best){if(norm(s.vendor).join(' ')===norm(best.vendor).join(' '))return{contractId:best.id,method:'Vendor (exact)',confidence:0.85};
    if(sc>=0.99)return{contractId:best.id,method:'Vendor (fuzzy)',confidence:0.70};
    if(sc>=0.5)return{contractId:best.id,method:'Vendor (fuzzy)',confidence:0.55};}
  return{contractId:null,method:'Unmatched',confidence:0};
}
spend.forEach(s=>{const m=matchOne(s);s.contractId=m.contractId;s.method=m.method;s.confidence=m.confidence;});
const cById=id=>contracts.find(c=>c.id===id);
const byContract=id=>spend.filter(s=>s.contractId===id);
const sum=a=>a.reduce((t,s)=>t+s.amount,0);
const catOf=s=>s.category||(s.contractId?cById(s.contractId).category:'Uncategorised');
const canonVendor=s=>s.contractId?cById(s.contractId).vendor:s.vendor;

/* ---------------- DETECTION (with recovery/savings buckets) ---------------- */
const RECOVERY=new Set(['Overspend vs ACV','Spend after expiry','Duplicate invoice']);
function detect(){
  const S=STATE.settings,R=S.recapture,opps=[];
  const mav=spend.filter(s=>!s.contractId),mavExp=sum(mav);
  if(mavExp>0)opps.push({id:'maverick',type:'Maverick spend',tag:'Off-contract',subject:`${mav.length} invoices · ${new Set(mav.map(s=>s.vendor)).size} vendors`,impact:mavExp*R,exposure:mavExp,confidence:0.78,conf:'med',
    rationale:`${fmt(mavExp)} of spend across ${new Set(mav.map(s=>s.vendor)).size} vendors has no matching contract. Bringing it under contract typically recaptures 5–15%.`,
    formula:`Exposure = Σ unmatched spend = <b>${fmt(mavExp)}</b>\nEst. savings = Exposure × recapture rate = ${fmt(mavExp)} × <b>${Math.round(R*100)}%</b> = <b>${fmt(mavExp*R)}</b>`,
    action:`Consolidate the ${new Set(mav.map(s=>s.vendor)).size} off-contract vendors under negotiated agreements; draft an RFP for the largest category. Target ${Math.round(R*100)}% recapture = ${fmt(mavExp*R)}.`,evidence:mav});
  contracts.forEach(c=>{if(c.yearlyCommit==null)return;const a=sum(byContract(c.id)),sf=c.yearlyCommit-a;if(sf>S.unusedPct*c.yearlyCommit)opps.push({id:'unused:'+c.id,type:'Unused commit',tag:'Unused commit',subject:c.vendor,contractId:c.id,impact:sf,confidence:0.9,conf:'high',
    rationale:`Contract ${c.id} commits ${fmt(c.yearlyCommit)}/yr but only ${fmt(a)} was matched — ${fmt(sf)} (${Math.round(pct(sf,c.yearlyCommit))}%) unused.`,
    formula:`Shortfall = Yearly Commit − Actual = ${fmt(c.yearlyCommit)} − ${fmt(a)} = <b>${fmt(sf)}</b>`,
    action:`Renegotiate ${c.vendor} commitment toward ${fmt(a)} at renewal, or drive utilisation.`,evidence:byContract(c.id)});});
  contracts.forEach(c=>{const a=sum(byContract(c.id)),o=a-c.acv;if(o>S.overspendPct*c.acv)opps.push({id:'overspend:'+c.id,type:'Overspend vs ACV',tag:'Overspend',subject:c.vendor,contractId:c.id,impact:o,confidence:0.85,conf:'high',
    rationale:`Matched spend ${fmt(a)} exceeds ACV ${fmt(c.acv)} by ${fmt(o)} (${Math.round(pct(o,c.acv))}%). Audit for off-rate or out-of-scope charges.`,
    formula:`Overage = Actual − ACV = ${fmt(a)} − ${fmt(c.acv)} = <b>${fmt(o)}</b>`,
    action:`Request a rate/line-item audit from ${c.vendor}; reconcile the ${fmt(o)} overage before next payment.`,evidence:byContract(c.id)});});
  contracts.forEach(c=>{if(c.renewalType!=='Auto-renewal')return;const nd=new Date(d(c.end).getTime()-c.renewalNoticeDays*86400000),dl=daysBetween(nd,ASOF());if(dl<=S.lookahead){const uc=c.acv*c.uplift/100,nt=c.acv*(1+c.uplift/100),urg=dl<=0;
    opps.push({id:'autorenew:'+c.id,type:'Silent auto-renewal',tag:'Auto-renewal',subject:c.vendor,contractId:c.id,impact:uc,confidence:0.9,conf:'high',
    rationale:`Contract ${c.id} auto-renews. Notice deadline ${nd.toISOString().slice(0,10)} is ${urg?`<b style="color:#d63d4f">${Math.abs(dl)} days PAST</b>`:`${dl} days away`}. ${c.uplift}% uplift on ${fmt(c.acv)} ACV.`,
    formula:`Negotiable uplift = ACV × uplift% = ${fmt(c.acv)} × <b>${c.uplift}%</b> = <b>${fmt(uc)}</b>\nNext-term value at risk = <b>${fmt(nt)}</b>`,
    action:`Send ${c.vendor} renegotiation/non-renewal notice before ${nd.toISOString().slice(0,10)}; target removing the ${c.uplift}% uplift = ${fmt(uc)}.`,evidence:byContract(c.id)});}});
  const af=new Set(opps.filter(o=>o.type==='Silent auto-renewal').map(o=>o.contractId));
  contracts.forEach(c=>{if(c.uplift<=0||af.has(c.id)||c.status==='Expired')return;const uc=c.acv*c.uplift/100;
    opps.push({id:'uplift:'+c.id,type:'Uplift creep',tag:'Uplift creep',subject:c.vendor,contractId:c.id,impact:uc,confidence:0.72,conf:'med',
    rationale:`Contract ${c.id} carries a ${c.uplift}% renewal uplift on ${fmt(c.acv)} ACV (whether fair vs market needs external data — out of scope).`,
    formula:`Annual uplift cost = ACV × uplift% = ${fmt(c.acv)} × <b>${c.uplift}%</b> = <b>${fmt(uc)}</b>`,
    action:`Challenge the ${c.uplift}% uplift at the ${c.vendor} renewal; request a cap.`,evidence:byContract(c.id)});});
  contracts.forEach(c=>{const post=byContract(c.id).filter(s=>d(s.spendDate)>d(c.end)),amt=sum(post);if(amt>0)opps.push({id:'expiry:'+c.id,type:'Spend after expiry',tag:'Post-expiry',subject:c.vendor,contractId:c.id,impact:amt,confidence:0.88,conf:'high',
    rationale:`Contract ${c.id} expired ${c.end}, but ${fmt(amt)} posted after — off-contract exposure and compliance gap.`,
    formula:`Post-expiry = Σ spend where date > End (${c.end}) = ${post.map(s=>fmt(s.amount)).join(' + ')} = <b>${fmt(amt)}</b>`,
    action:`Stop or re-paper ${c.vendor}; move ${fmt(amt)} onto a current agreement.`,evidence:post});});
  const seen={};spend.forEach(s=>{(seen[s.invoice]=seen[s.invoice]||[]).push(s);});
  Object.values(seen).forEach(g=>{if(g.length>1&&g.every(x=>x.amount===g[0].amount)){const rec=g[0].amount*(g.length-1);
    opps.push({id:'dup:'+g[0].invoice,type:'Duplicate invoice',tag:'Duplicate',subject:g[0].vendor,contractId:g[0].contractId,impact:rec,confidence:0.82,conf:'high',
    rationale:`Invoice ${g[0].invoice} (${fmt(g[0].amount)}) appears ${g.length} times — likely double payment.`,
    formula:`Recoverable = amount × (occurrences − 1) = ${fmt(g[0].amount)} × ${g.length-1} = <b>${fmt(rec)}</b>`,
    action:`Issue a debit memo to ${g[0].vendor} for duplicate ${g[0].invoice}; add 3-way-match control.`,evidence:g});}});
  opps.forEach(o=>{o.status=STATE.statuses[o.id]||'open';o.score=o.impact*o.confidence;o.bucket=RECOVERY.has(o.type)?'recovery':'savings';});
  opps.sort((a,b)=>b.score-a.score);
  return opps;
}
function kpis(opps){
  const total=sum(spend),matched=sum(spend.filter(s=>s.contractId)),po=sum(spend.filter(s=>s.method==='PO')),mav=sum(spend.filter(s=>!s.contractId));
  const identified=opps.reduce((t,o)=>t+o.impact,0);
  const recovered=opps.filter(o=>o.status==='recovered').reduce((t,o)=>t+o.impact,0);
  const recoverable=opps.filter(o=>o.bucket==='recovery').reduce((t,o)=>t+o.impact,0);
  const savings=opps.filter(o=>o.bucket==='savings').reduce((t,o)=>t+o.impact,0);
  return {total,matched,po,mav,identified,recovered,recoverable,savings,oppCount:opps.length,
    sum:pct(matched,total),compliance:pct(po,total),poCoverage:pct(spend.filter(s=>s.po).length,spend.length)};
}

    return `<tr class="main-row clk orow" data-i="${i}"><td>${i+1}</td><td><b>${o.type}</b><div style="font-size:11px;color:var(--muted)">${esc(o.subject||'')}</div></td><td>${cf?esc(cf.vendor):'<span style="color:var(--muted)">multiple</span>'}</td><td><span class="tag">${o.tag}</span></td><td class="r impact">${fmt(o.impact)}${o.exposure?`<div style="font-size:10px;color:var(--muted);font-weight:500">${fmt(o.exposure)} exp.</div>`:''}</td><td><span class="conf ${confCls(o.conf)}">${confLbl(o.conf)} ${o.confidence.toFixed(2)}</span></td><td><span class="st ${stCls(o.status)}">${stLbl(o.status)}</span></td><td><span class="chev">▶</span></td></tr>
    <tr class="detail" id="od-${i}" style="display:none"><td colspan="8"><div class="det"><div class="rat">${o.rationale}</div><div class="formula">${o.formula}</div><div class="action"><div class="ah">✦ Recommended action</div>${esc(o.action)}</div>
      ${cf?`<div class="ev"><div class="eh">Contract — ${cf.id}</div><table class="evt"><tr><th>ACV</th><th>Commit</th><th>End</th><th>Renewal</th><th>Uplift</th><th>Index</th></tr><tr><td>${fmt(cf.acv)}</td><td>${cf.yearlyCommit!=null?fmt(cf.yearlyCommit):'—'}</td><td>${cf.end}</td><td>${cf.renewalType}</td><td>${cf.uplift?cf.uplift+'%':'—'}</td><td>${cf.indexType}</td></tr></table></div>`:''}
      <div class="ev"><div class="eh">Spend evidence (${(o.evidence||[]).length})</div><table class="evt"><tr><th>ID</th><th>Vendor</th><th class="r">Amount</th><th>Date</th><th>PO</th><th>Match</th></tr>${ev||'<tr><td colspan=6 class="note">—</td></tr>'}</table></div>
      <div style="margin-top:14px"><button class="btn ${o.status==='in_progress'?'p':''}" data-set="in_progress" data-id="${o.id}">Mark in progress</button><button class="btn ${o.status==='recovered'?'g':''}" data-set="recovered" data-id="${o.id}">Mark recovered</button><button class="btn" data-set="open" data-id="${o.id}">Reopen</button></div>
    </div></td></tr>`;}).join('')||'<tr><td colspan="8" class="note" style="padding:18px">No opportunities match.</td></tr>';
  tb.querySelectorAll('tr.orow').forEach(tr=>tr.onclick=e=>{if(e.target.closest('button'))return;const i=tr.dataset.i,det=document.getElementById('od-'+i),op=det.style.display!=='none';det.style.display=op?'none':'table-row';tr.classList.toggle('open',!op);});
  tb.querySelectorAll('button[data-set]').forEach(b=>b.onclick=()=>{STATE.statuses[b.dataset.id]=b.dataset.set;render();});
  document.getElementById('ftype').onchange=e=>{f.type=e.target.value;vOpps();};
  document.getElementById('fstatus').onchange=e=>{f.status=e.target.value;vOpps();};
  document.getElementById('fmin').onchange=e=>{f.min=+e.target.value;vOpps();};
}

/* ---------- SPEND EXPLORER (+ taxonomy) ---------- */
function vSpend(){
  const f=STATE.spendFilter;const cats=[...new Set(spend.map(catOf))].sort();const ccs=[...new Set(spend.map(s=>s.costCenter))].sort();
  let rows=spend.filter(s=>{if(f.q&&!s.vendor.toLowerCase().includes(f.q.toLowerCase()))return false;if(f.cat&&catOf(s)!==f.cat)return false;if(f.cc&&s.costCenter!==f.cc)return false;if(f.match==='matched'&&!s.contractId)return false;if(f.match==='unmatched'&&s.contractId)return false;return true;});
  const tot=sum(rows),mt=sum(rows.filter(s=>s.contractId));
  const byL1={};rows.forEach(s=>byL1[l1Of(catOf(s))]=(byL1[l1Of(catOf(s))]||0)+s.amount);
  const byCat={};rows.forEach(s=>byCat[catOf(s)]=(byCat[catOf(s)]||0)+s.amount);
  const byVen={};rows.forEach(s=>byVen[canonVendor(s)]=(byVen[canonVendor(s)]||0)+s.amount);
  V(`
  <div class="kpis k3">
    <div class="kpi"><div class="l">Filtered spend</div><div class="v">${fmtK(tot)}</div><div class="s">${rows.length} records</div></div>
    <div class="kpi"><div class="l">Matched</div><div class="v">${pct(mt,tot||1).toFixed(1)}%</div><div class="s">${fmtK(mt)}</div></div>
    <div class="kpi"><div class="l">Vendors / categories</div><div class="v">${Object.keys(byVen).length} / ${Object.keys(byCat).length}</div><div class="s">in view</div></div>
  </div>
  <div class="grid2">
    <div class="panel"><h2>Spend taxonomy — Level 1</h2><p class="sub">Top-level category rollup (drill via the category filter).</p>${barRows(Object.entries(byL1).sort((a,b)=>b[1]-a[1]))}</div>
    <div class="panel"><h2>By category (Level 2)</h2><p class="sub">Filtered view.</p>${barRows(Object.entries(byCat).sort((a,b)=>b[1]-a[1]),'a')}</div>
  </div>
  <div class="panel">
    <div class="filters">
      <input type="text" id="sq" placeholder="Search vendor…" value="${esc(f.q)}">
      <select id="scat"><option value="">All categories</option>${cats.map(c=>`<option ${f.cat===c?'selected':''}>${c}</option>`).join('')}</select>
      <select id="scc"><option value="">All cost centres</option>${ccs.map(c=>`<option ${f.cc===c?'selected':''}>${c}</option>`).join('')}</select>
      <select id="smatch"><option value="">All</option><option value="matched" ${f.match==='matched'?'selected':''}>Matched</option><option value="unmatched" ${f.match==='unmatched'?'selected':''}>Unmatched</option></select>
    </div>
    <table><thead><tr><th>ID</th><th>Vendor</th><th>L1</th><th>Category</th><th>Cost centre</th><th class="r">Amount</th><th>Date</th><th>PO</th><th>Match</th></tr></thead><tbody>
    ${rows.sort((a,b)=>b.amount-a.amount).slice(0,60).map(s=>`<tr class="main-row"><td>${s.id}</td><td>${esc(s.vendor)}</td><td><span class="tag b">${l1Of(catOf(s))}</span></td><td>${catOf(s)}</td><td>${s.costCenter}</td><td class="r impact">${fmt(s.amount)}</td><td>${s.spendDate}</td><td>${s.po||'<span style="color:#b9b6c8">—</span>'}</td><td><span class="pill ${pillCls(s.method)}">${s.method}</span></td></tr>`).join('')}
    </tbody></table>${rows.length>60?`<div class="note" style="margin-top:8px">Top 60 of ${rows.length} by amount.</div>`:''}
  </div>`);
  document.getElementById('sq').oninput=e=>{f.q=e.target.value;vSpend();document.getElementById('sq').focus();};
  document.getElementById('scat').onchange=e=>{f.cat=e.target.value;vSpend();};
  document.getElementById('scc').onchange=e=>{f.cc=e.target.value;vSpend();};
  document.getElementById('smatch').onchange=e=>{f.match=e.target.value;vSpend();};
}

/* ---------- CONTRACTS ---------- */
function vContracts(){

  V(`<div class="panel"><table><thead><tr><th>ID</th><th>Vendor</th><th>Category</th><th>Entity</th><th class="r">ACV</th><th>Utilisation</th><th>End</th><th>Index</th><th class="r">Opp.</th><th></th></tr></thead><tbody id="ctb"></tbody></table></div>`);
  const tb=document.getElementById('ctb');
  tb.innerHTML=contracts.map((c,i)=>{const act=sum(byContract(c.id)),base=c.yearlyCommit||c.acv,u=pct(act,base),col=u>100?'var(--red)':u>=80?'var(--green)':'var(--amber)';
    const ev=byContract(c.id).map(s=>`<tr><td>${s.id}</td><td class="r">${fmt(s.amount)}</td><td>${s.spendDate}</td><td>${s.po||'—'}</td><td><span class="pill ${pillCls(s.method)}">${s.method}</span></td></tr>`).join('');
    return `<tr class="main-row clk crow" data-i="${i}"><td>${c.id}</td><td><b>${esc(c.vendor)}</b></td><td>${c.category}</td><td><span class="tag gy">${c.entity}</span></td><td class="r">${fmt(c.acv)}</td><td><span class="util"><i style="width:${Math.min(100,u)}%;background:${col}"></i></span>${u.toFixed(0)}%</td><td>${c.end}</td><td><span class="tag ${c.indexType==='None'?'gy':'a'}">${c.indexType}</span></td><td class="r impact">${oppByC[c.id]?fmt(oppByC[c.id]):'—'}</td><td><span class="chev">▶</span></td></tr>
    <tr class="detail" id="cd-${i}" style="display:none"><td colspan="10"><div class="det"><table class="evt" style="max-width:760px"><tr><th>TCV</th><th>ACV</th><th>Commit</th><th>Term</th><th>Renewal</th><th>Notice</th><th>Uplift</th><th>Index share</th><th>Payment</th></tr><tr><td>${fmt(c.tcv)}</td><td>${fmt(c.acv)}</td><td>${c.yearlyCommit!=null?fmt(c.yearlyCommit):'—'}</td><td>${c.start}→${c.end}</td><td>${c.renewalType}</td><td>${c.renewalNoticeDays}d</td><td>${c.uplift?c.uplift+'%':'—'}</td><td>${c.indexedShare}%</td><td>Net ${c.paymentTermDays}</td></tr></table>
      <div class="ev"><div class="eh">Linked spend (${byContract(c.id).length} · ${fmt(act)})</div><table class="evt"><tr><th>ID</th><th class="r">Amount</th><th>Date</th><th>PO</th><th>Match</th></tr>${ev||'<tr><td colspan=5 class="note">None</td></tr>'}</table></div></div></td></tr>`;}).join('');
  tb.querySelectorAll('tr.crow').forEach(tr=>tr.onclick=()=>{const i=tr.dataset.i,det=document.getElementById('cd-'+i),op=det.style.display!=='none';det.style.display=op?'none':'table-row';tr.classList.toggle('open',!op);});

/* ---------- VENDORS ---------- */
function vVendors(){
  const opps=detect();const oppByC={};opps.forEach(o=>{if(o.contractId)oppByC[o.contractId]=(oppByC[o.contractId]||0)+o.impact;});
  const map={};spend.forEach(s=>{const v=canonVendor(s);(map[v]=map[v]||{vendor:v,spend:0,recs:0,contracts:new Set(),cat:catOf(s),opp:0,matched:0}).spend+=s.amount;map[v].recs++;if(s.contractId){map[v].contracts.add(s.contractId);map[v].matched+=s.amount;}});
  Object.values(map).forEach(v=>v.contracts.forEach(cid=>v.opp+=(oppByC[cid]||0)));
  const rows=Object.values(map).sort((a,b)=>b.spend-a.spend);
  const catVen={};Object.values(map).forEach(v=>{(catVen[v.cat]=catVen[v.cat]||new Set()).add(v.vendor);});
  const consol=Object.entries(catVen).filter(([c,s])=>s.size>1).map(([c,s])=>[c,[...s]]);
  V(`
  <div class="panel"><h2>Consolidation candidates</h2><p class="sub">Categories served by more than one vendor.</p>
    ${consol.length?`<table><thead><tr><th>Category</th><th>Vendors</th><th class="r">Combined spend</th></tr></thead><tbody>${consol.map(([c,vs])=>`<tr class="main-row"><td><b>${c}</b></td><td>${vs.map(esc).join(', ')} <span class="tag b">${vs.length}</span></td><td class="r impact">${fmt(vs.reduce((t,v)=>t+map[v].spend,0))}</td></tr>`).join('')}</tbody></table>`:'<div class="note">No multi-vendor categories.</div>'}</div>
  <div class="panel"><h2>All vendors</h2><p class="sub">Canonical rollup (fuzzy variants folded into matched vendor).</p>
    <table><thead><tr><th>Vendor</th><th>Category</th><th class="r">Spend</th><th class="r">Records</th><th class="r">Contracts</th><th>Match</th><th class="r">Opportunity</th></tr></thead><tbody>
    ${rows.map(v=>`<tr class="main-row"><td><b>${esc(v.vendor)}</b></td><td>${v.cat}</td><td class="r impact">${fmt(v.spend)}</td><td class="r">${v.recs}</td><td class="r">${v.contracts.size||'<span style="color:var(--red)">0</span>'}</td><td><span class="conf ${v.contracts.size?'c-high':'c-low'}">${pct(v.matched,v.spend).toFixed(0)}%</span></td><td class="r">${v.opp?fmt(v.opp):'—'}</td></tr>`).join('')}</tbody></table></div>`);
}

    ${rows.sort((a,b)=>b.exp-a.exp).map(r=>`<tr class="main-row"><td>${r.c.id}</td><td><b>${esc(r.c.vendor)}</b></td><td><span class="tag a">${r.c.indexType}</span></td><td class="r">${fmt(r.c.acv)}</td><td class="r">${r.c.indexedShare}%</td><td class="r">${fmt(r.indexedVal)}</td><td class="r impact">${fmt(r.exp)}</td></tr>`).join('')}
    <tr style="border-top:2px solid var(--line)"><td colspan="5"><b>Total</b></td><td class="r"><b>${fmt(totIndexed)}</b></td><td class="r impact"><b>${fmt(totExp)}</b></td></tr></tbody></table></div>
  <div class="panel"><h2>Indexed value by clause type</h2><p class="sub">CPI-linked terms carry open-ended exposure; fixed uplifts are capped but compounding.</p>${barRows(Object.entries(byType).sort((a,b)=>b[1]-a[1]),'a')}</div>
  <div class="foot"><b>Why this matters:</b> index/uplift terms are read straight from the contract record — the move % is a transparent assumption, not an external CPI feed.</div>`);
  document.getElementById('imove').oninput=e=>{STATE.indexMove=+e.target.value;vIndex();};

/* ---------- MARGIN RECOVERY (audit packs) ---------- */

  const opps=detect().filter(o=>o.bucket==='recovery');

  V(`
  <div class="kpis k3">

      <table style="margin-top:10px"><thead><tr><th>Type</th><th>Detail</th><th class="r">Amount</th><th>Status</th><th></th></tr></thead><tbody>
      ${g.items.map(o=>`<tr class="main-row"><td><span class="tag a">${o.tag}</span></td><td>${esc(o.subject||'')} <span class="note">— ${o.rationale.replace(/<[^>]+>/g,'').slice(0,90)}…</span></td><td class="r impact">${fmt(o.impact)}</td><td><span class="st ${stCls(o.status)}">${stLbl(o.status)}</span></td><td><button class="btn ${o.status==='recovered'?'g':''}" data-rec="${o.id}">${o.status==='recovered'?'Recovered':'Mark recovered'}</button></td></tr>`).join('')}
      </tbody></table></div>`).join('')||'<div class="panel note">No recoverable items.</div>'}

/* ---------- RENEWALS ---------- */
function vRenewals(){
  const rows=contracts.filter(c=>c.status!=='Expired').map(c=>{const nd=new Date(d(c.end).getTime()-c.renewalNoticeDays*86400000),dl=daysBetween(nd,ASOF()),upl=c.acv*c.uplift/100;return{c,nd,dl,upl,urg:dl<=0?'overdue':dl<=STATE.settings.lookahead?'soon':'ok'};}).sort((a,b)=>a.dl-b.dl);
  const exp=rows.filter(r=>r.urg!=='ok').reduce((t,r)=>t+r.upl,0);
  V(`<div class="kpis k3">
    <div class="kpi"><div class="l">Renewals in window</div><div class="v">${rows.filter(r=>r.urg!=='ok').length}</div><div class="s">${STATE.settings.lookahead}-day notice</div></div>
    <div class="kpi"><div class="l">Auto-renew (window)</div><div class="v">${rows.filter(r=>r.urg!=='ok'&&r.c.renewalType==='Auto-renewal').length}</div><div class="s">act before deadline</div></div>
    <div class="kpi hl"><div class="l">Uplift exposure</div><div class="v">${fmtK(exp)}</div><div class="s">negotiable</div></div></div>

  ${rows.map(r=>{const b=r.urg==='overdue'?'<span class="st" style="background:var(--red-bg);color:var(--red)">Overdue</span>':r.urg==='soon'?'<span class="st st-prog">Soon</span>':'<span class="st st-rec">OK</span>';return `<tr class="main-row"><td>${b}</td><td><b>${esc(r.c.vendor)}</b></td><td>${r.c.end}</td><td>${r.nd.toISOString().slice(0,10)}</td><td class="r" style="font-weight:700;color:${r.dl<=0?'var(--red)':r.urg==='soon'?'var(--amber)':'var(--muted)'}">${r.dl}</td><td><span class="tag ${r.c.renewalType==='Auto-renewal'?'':'gy'}">${r.c.renewalType}</span></td><td class="r">${fmt(r.c.acv)}</td><td class="r impact">${r.c.uplift?fmt(r.upl):'—'}</td></tr>`;}).join('')}</tbody></table></div>`);
}

/* ---------- COMMITMENT CHECK (CCL) ---------- */
function vCCL(){
  const c=STATE.ccl;const exp=s=>c.value*(c.indexShare/100)*(s/100);const e5=exp(5),e10=exp(10),e15=exp(15);
  let verdict,vc,vexp;
  if(e5>c.tolerance){verdict='BLOCK';vc='v-blk';vexp=`Even a 5% adverse move (${fmt(e5)}) breaches the ${fmt(c.tolerance)} tolerance. Renegotiate indexation or add a cap before signing.`;}
  else if(e15>c.tolerance){verdict='CONDITION';vc='v-con';vexp=`Resilient to small moves, but a 15% move (${fmt(e15)}) breaches tolerance. Approve only with an index cap / price-protection clause.`;}
  else{verdict='APPROVE';vc='v-app';vexp=`Exposure stays within ${fmt(c.tolerance)} even at +15% (${fmt(e15)}). Safe to commit.`;}
  V(`<div class="grid2">
    <div class="panel"><h2>Proposed commitment</h2><p class="sub">Model indexed exposure before the deal is signed.</p>
      <div class="formrow"><label>Annual commitment value</label><input type="number" id="cv" value="${c.value}" step="10000"></div>
      <div class="formrow"><label>Term (years)</label><input type="number" id="ct" value="${c.term}" min="1" max="10"></div>
      <div class="formrow"><label>Index-linked share <span class="note">${c.indexShare}%</span></label><input type="range" id="cis" min="0" max="100" value="${c.indexShare}"></div>
      <div class="formrow"><label>Margin tolerance ($/yr)</label><input type="number" id="ctol" value="${c.tolerance}" step="5000"></div>
      <div class="note">Index-linked share and tolerance are your inputs — first-party assumptions, not an external price feed.</div></div>
    <div class="panel"><h2>Margin exposure — stress test</h2><p class="sub">Indexed portion = ${fmt(c.value*c.indexShare/100)} of ${fmt(c.value)}.</p>
      ${barRows([['+5% move',e5],['+10% move',e10],['+15% move',e15]],'a')}
      <div class="verdict ${vc}" style="margin-top:16px">${verdict==='APPROVE'?'✓':verdict==='CONDITION'?'▲':'✕'} ${verdict}</div><div class="note">${vexp}</div>
      <table class="evt" style="margin-top:14px"><tr><th>Scenario</th><th class="r">Annual</th><th class="r">Over ${c.term}y</th><th>vs tolerance</th></tr>
      ${[['+5%',e5],['+10%',e10],['+15%',e15]].map(([l,e])=>`<tr><td>${l}</td><td class="r">${fmt(e)}</td><td class="r">${fmt(e*c.term)}</td><td>${e>c.tolerance?'<span class="conf c-low">Breach</span>':'<span class="conf c-high">Within</span>'}</td></tr>`).join('')}</table></div></div>
  <div class="foot"><b>Pre-commitment control:</b> governs commitments before they execute, on first-party logic — no external index feed required.</div>`);
  document.getElementById('cv').oninput=e=>{c.value=+e.target.value||0;vCCL();};
  document.getElementById('ct').oninput=e=>{c.term=+e.target.value||1;vCCL();};
  document.getElementById('cis').oninput=e=>{c.indexShare=+e.target.value;vCCL();};
  document.getElementById('ctol').oninput=e=>{c.tolerance=+e.target.value||0;vCCL();};
}

/* ---------- COPILOT (ask + generate documents) ---------- */
function answer(q){
  q=(''+q).toLowerCase();
  const opps=detect(),k=kpis(opps);
  const inDays=n=>contracts.filter(c=>{const dd=daysBetween(d(c.end),ASOF());return dd>=0&&dd<=n;});
  if(q.includes('save the most')){const t=opps.slice(0,3);return 'Your three highest-impact opportunities: '+t.map(o=>`<b>${o.type} — ${o.subject||''}</b> (${fmt(o.impact)})`).join('; ')+`. Combined ${fmt(t.reduce((a,o)=>a+o.impact,0))}.`;}
  if(q.includes('auto-renew')){const t=opps.filter(o=>o.type==='Silent auto-renewal');return t.length?`${t.length} contract(s) auto-renew within the notice window: `+t.map(o=>`<b>${o.subject}</b> (${fmt(o.impact)} uplift)`).join(', ')+'. Act before each notice deadline.':'No auto-renewals in the current window.';}
  if(q.includes('off-contract')){const m=opps.find(o=>o.id==='maverick');return m?`${fmt(m.exposure)} of spend is off-contract across ${m.subject}. Estimated ${fmt(m.impact)} recoverable at the current recapture rate.`:'No off-contract spend detected.';}
  if(q.includes('consolidate')){const map={};spend.forEach(s=>{const c=catOf(s);(map[c]=map[c]||new Set()).add(canonVendor(s));});const m=Object.entries(map).filter(([c,s])=>s.size>1);return m.length?'Consolidation candidates: '+m.map(([c,s])=>`<b>${c}</b> (${s.size} vendors)`).join(', ')+'.':'No multi-vendor categories.';}
  if(q.includes('recover')){return `${fmt(k.recoverable)} is recoverable right now — duplicates, post-expiry spend and overspend vs ACV. See the Margin Recovery tab to package supplier challenges.`;}
  if(q.includes('renewal')||q.includes('renew alert')){const t=opps.filter(o=>o.type==='Silent auto-renewal'||o.type==='Uplift creep');const e=inDays(STATE.settings.lookahead);return `In the next ${STATE.settings.lookahead} days, ${e.length} contract(s) reach term and ${t.length} carry renewal-uplift exposure (${fmt(t.reduce((a,o)=>a+o.impact,0))} negotiable). Top priority: `+(t[0]?`<b>${t[0].subject}</b> (${fmt(t[0].impact)})`:'none')+'. See the Renewals tab.';}
  if(q.includes('expir')){const e=inDays(90).sort((a,b)=>d(a.end)-d(b.end));return e.length?`${e.length} contract(s) expire within 90 days: `+e.map(c=>`<b>${c.vendor}</b> (${c.end})`).join(', ')+'.':'No contracts expire within 90 days.';}
  if(q.includes('total contract value')||q.includes('tcv')){const tot=contracts.reduce((t,c)=>t+c.tcv,0);const top=[...contracts].sort((a,b)=>b.tcv-a.tcv).slice(0,3);return `Total contract value across ${contracts.length} contracts is ${fmt(tot)}. Largest: `+top.map(c=>`<b>${c.vendor}</b> (${fmt(c.tcv)})`).join(', ')+'.';}
  if(q.includes('commit')){const cc=contracts.filter(x=>x.yearlyCommit!=null);const tot=cc.reduce((t,x)=>t+x.yearlyCommit,0);return cc.length?`${cc.length} contract(s) carry a yearly commit totalling ${fmt(tot)}: `+cc.map(x=>`<b>${x.vendor}</b> (${fmt(x.yearlyCommit)})`).join(', ')+'. Check Opportunities for under-utilised commits.':'No contracts with yearly commits.';}
  return "I answer from your spend and contracts — try: renewal alerts, contracts expiring soon, total contract value, yearly commits, where you can save the most, or what's recoverable.";
}
function genDoc(type,vendor){
  const c=contracts.find(x=>x.vendor===vendor);const opps=detect().filter(o=>c&&o.contractId===c.id);
  const actual=c?sum(byContract(c.id)):sum(spend.filter(s=>canonVendor(s)===vendor));
  const find=t=>opps.find(o=>o.type===t);const L=[];
  const head=()=>{L.push('To: '+vendor+' — Account Management');L.push('From: Procurement, [Your Company]');L.push('Date: '+STATE.settings.asOf);if(c)L.push('Re: Contract '+c.id+' ('+c.category+')');L.push('');};
  if(type==='Renegotiation email'){
    head();L.push('Dear '+vendor+' team,');L.push('');
    L.push('As part of our annual commercial review, we analysed our spend against '+(c?'contract '+c.id:'our agreement')+'. Key findings:');
    if(c)L.push('• Annual contract value '+fmt(c.acv)+'; matched spend over the last 12 months '+fmt(actual)+(c.yearlyCommit?(' against a committed '+fmt(c.yearlyCommit)+' ('+Math.round(pct(actual,c.yearlyCommit))+'% utilised).'):'.'));
    const un=find('Unused commit');if(un)L.push('• We are tracking '+fmt(un.impact)+' below committed volume and would like to right-size the commitment.');
    const up=find('Uplift creep')||find('Silent auto-renewal');if(up&&c)L.push('• The '+c.uplift+'% renewal uplift ('+fmt(c.acv*c.uplift/100)+'/yr) is above our planning assumptions; we request a cap aligned to a fixed, agreed index.');
    const ov=find('Overspend vs ACV');if(ov)L.push('• Billing of '+fmt(ov.impact)+' above ACV needs a line-item reconciliation.');
    L.push('');L.push('We value the partnership and would like to align on revised terms ahead of the '+(c?c.end:'upcoming')+' renewal. Could we schedule a call in the next two weeks?');
    L.push('');L.push('Best regards,');L.push('[Name], Procurement');
  } else if(type==='Non-renewal notice'){
    head();L.push('Dear '+vendor+',');L.push('');
    const ar=find('Silent auto-renewal');const nd=c?new Date(d(c.end).getTime()-c.renewalNoticeDays*86400000).toISOString().slice(0,10):'[deadline]';
    L.push('This letter constitutes formal notice that [Your Company] does not intend to allow '+(c?'contract '+c.id:'our agreement')+' to auto-renew on its current terms, effective prior to the notice deadline of '+nd+'.');
    if(ar&&c)L.push('Our review identified an automatic '+c.uplift+'% uplift on the '+fmt(c.acv)+' ACV ('+fmt(c.acv*c.uplift/100)+'/yr) that we are not prepared to accept without renegotiation.');
    L.push('');L.push('We remain open to continuing on revised commercial terms and welcome a proposal that reflects our current usage and a capped escalation. Absent agreement, this notice preserves our right to exit at term end.');
    L.push('');L.push('Regards,');L.push('[Name], Procurement');
  } else if(type==='Supplier challenge letter'){
    head();L.push('Dear '+vendor+',');L.push('');
    const rec=detect().filter(o=>o.bucket==='recovery'&&((c&&o.contractId===c.id)||o.subject===vendor));
    const tot=rec.reduce((t,o)=>t+o.impact,0);
    L.push('A reconciliation of invoices against '+(c?'contract '+c.id:'our agreement')+' identified the following discrepancies totalling '+fmt(tot)+', which we request be credited:');
    rec.forEach(o=>L.push('• '+o.type+': '+fmt(o.impact)+' — '+o.rationale.replace(/<[^>]+>/g,'')));
    if(!rec.length)L.push('• [No recovery items currently detected for this supplier.]');
    L.push('');L.push('Please confirm the credit / refund within '+(c?c.paymentTermDays:30)+' days per our payment terms. Supporting invoice-level detail is attached.');
    L.push('');L.push('Regards,');L.push('Accounts Payable, [Your Company]');
  } else if(type==='RFP brief'){
    const cat=c?c.category:'the category';const catSpend=sum(spend.filter(s=>catOf(s)===(c?c.category:'')));
    L.push('RFP BRIEF — '+cat);L.push('Date: '+STATE.settings.asOf);L.push('');
    L.push('Objective: competitively source '+cat+' spend (~'+fmt(catSpend||actual)+'/yr) to reduce cost and improve terms.');
    L.push('Incumbent: '+vendor+(c?(' (contract '+c.id+', ACV '+fmt(c.acv)+', renews '+c.end+')'):'')+'.');
    L.push('Scope: full category requirement; pricing on a fixed-rate card with capped, index-referenced escalation.');
    L.push('Evaluation: 50% commercial, 30% capability/SLA, 20% implementation & risk.');
    L.push('Targets: ≥'+Math.round(STATE.settings.recapture*100)+'% cost reduction vs. current run-rate; removal of auto-renewal; volume-tier discounts.');
    L.push('Timeline: RFP issue → 2 wks responses → 2 wks evaluation → award. Total 4 weeks.');
  } else if(type==='Supplier SWOT'){
    L.push('SUPPLIER SWOT — '+vendor);L.push('Date: '+STATE.settings.asOf);L.push('');
    L.push('STRENGTHS');L.push('• Incumbent with '+(c?'an active contract ('+c.id+')':'established spend')+'; annual spend '+fmt(actual)+'.');if(c)L.push('• Known terms: '+c.renewalType+', '+(c.uplift?c.uplift+'% uplift':'no uplift')+', Net '+c.paymentTermDays+'.');
    L.push('WEAKNESSES');opps.forEach(o=>L.push('• '+o.type+' — '+fmt(o.impact)+'.'));if(!opps.length)L.push('• None detected from current data.');
    L.push('OPPORTUNITIES');L.push('• Renegotiation / consolidation leverage; total identified value '+fmt(opps.reduce((t,o)=>t+o.impact,0))+'.');
    L.push('THREATS');L.push('• '+(c&&c.renewalType==='Auto-renewal'?'Auto-renewal lock-in':'Switching cost')+(c&&c.uplift?'; compounding '+c.uplift+'% escalation':'')+'.');
    L.push('• Market benchmark unknown (requires external data — out of scope).');
  }
  return L.join('\n');
}
function vCopilot(){
  const cp=STATE.copilot;const vendors=contracts.map(c=>c.vendor);const docs=['Renegotiation email','Non-renewal notice','Supplier challenge letter','RFP brief','Supplier SWOT'];
  const qs=['Where can I save the most?','What auto-renews in the next 90 days?','How much spend is off-contract?','Which vendors should we consolidate?','What is recoverable right now?'];
  if(!cp.text)cp.text=genDoc(cp.doc,cp.vendor);
  V(`
  <div class="grid2">
    <div class="panel"><h2>Ask the data</h2><p class="sub">Computed from your spend + contracts — not a chatbot guess.</p>
      <div>${qs.map(q=>`<span class="chip" data-q="${esc(q)}">${q}</span>`).join('')}<span class="chip dis" title="Requires external benchmark data — out of scope">Are we paying above market?</span></div>
      <div class="qa" id="qa">${cp.log.map(e=>`<div class="q">${esc(e.q)}</div><div class="a">${e.a}</div>`).join('')||'<div class="note">Pick a question to begin.</div>'}</div>
    </div>
    <div class="panel"><h2>Generate document</h2><p class="sub">AI-assisted drafting from your data. Review before sending.</p>
      <select class="sel" id="cpv">${vendors.map(v=>`<option ${cp.vendor===v?'selected':''}>${esc(v)}</option>`).join('')}</select>
      <select class="sel" id="cpd">${docs.map(dx=>`<option ${cp.doc===dx?'selected':''}>${dx}</option>`).join('')}</select>
      <button class="btn p" id="cpg">Generate</button><button class="btn" id="cpc">Copy</button>
      <textarea class="doc" id="cpt" spellcheck="false">${esc(cp.text)}</textarea>
    </div>
  </div>
  <div class="foot"><b>NirvanAI</b> generates recommendations and document drafts deterministically from your first-party data — no external market intelligence.</div>`);
  document.querySelectorAll('[data-q]').forEach(ch=>ch.onclick=()=>{const q=ch.dataset.q;cp.log.push({q,a:answer(q.toLowerCase())});vCopilot();});
  document.getElementById('cpv').onchange=e=>{cp.vendor=e.target.value;cp.text=genDoc(cp.doc,cp.vendor);vCopilot();};
  document.getElementById('cpd').onchange=e=>{cp.doc=e.target.value;cp.text=genDoc(cp.doc,cp.vendor);vCopilot();};
  document.getElementById('cpg').onclick=()=>{cp.text=genDoc(cp.doc,cp.vendor);vCopilot();};
  document.getElementById('cpt').oninput=e=>{cp.text=e.target.value;};
  document.getElementById('cpc').onclick=()=>{const ta=document.getElementById('cpt');ta.select();try{navigator.clipboard.writeText(ta.value);}catch(e){document.execCommand&&document.execCommand('copy');}};
}

/* ---------- PORTFOLIO (multi-entity) ---------- */
function vPortfolio(){
  const opps=detect();const oppByC={};opps.forEach(o=>{if(o.contractId)oppByC[o.contractId]=(oppByC[o.contractId]||0)+o.impact;});
  const ent={};
  spend.forEach(s=>{const e=entityOf(s);(ent[e]=ent[e]||{entity:e,spend:0,matched:0,contracts:new Set(),opp:0}).spend+=s.amount;if(s.contractId){ent[e].matched+=s.amount;ent[e].contracts.add(s.contractId);}});
  contracts.forEach(c=>{if(ent[c.entity])ent[c.entity].opp+=(oppByC[c.id]||0);});
  const rows=Object.values(ent).sort((a,b)=>b.spend-a.spend);
  const byEnt=rows.map(r=>[r.entity,r.spend]);
  const byL1={};spend.forEach(s=>byL1[l1Of(catOf(s))]=(byL1[l1Of(catOf(s))]||0)+s.amount);
  V(`
  <div class="panel"><h2>Spend by entity</h2><p class="sub">Group-level rollup across legal entities.</p>${barRows(byEnt)}</div>
  <div class="panel"><h2>Entity scorecard</h2><p class="sub">Spend under management and identified opportunity per entity.</p>
    <table><thead><tr><th>Entity</th><th class="r">Spend</th><th class="r">SUM %</th><th class="r">Contracts</th><th class="r">Identified opp.</th><th class="r">Opp. % of spend</th></tr></thead><tbody>
    ${rows.map(r=>`<tr class="main-row"><td><b>${esc(r.entity)}</b></td><td class="r impact">${fmt(r.spend)}</td><td class="r"><span class="conf ${r.matched/r.spend>0.8?'c-high':'c-med'}">${pct(r.matched,r.spend).toFixed(0)}%</span></td><td class="r">${r.contracts.size}</td><td class="r">${r.opp?fmt(r.opp):'—'}</td><td class="r">${r.opp?pct(r.opp,r.spend).toFixed(1)+'%':'—'}</td></tr>`).join('')}</tbody></table></div>
  <div class="panel"><h2>Group spend by Level-1 category</h2>${barRows(Object.entries(byL1).sort((a,b)=>b[1]-a[1]),'a')}</div>
  <div class="foot"><b>Portfolio view:</b> consolidated, multi-entity visibility and control across the group, here by legal entity.</div>`);
}

/* ---------- DATA QUALITY ---------- */
function vQuality(){
  const po=spend.filter(s=>s.method==='PO'),fz=spend.filter(s=>s.method.startsWith('Vendor')),un=spend.filter(s=>!s.contractId),tot=sum(spend);
  V(`<div class="panel"><h2>Match coverage</h2><p class="sub">Every savings figure inherits the confidence of the link beneath it.</p>
    <div style="display:flex;height:26px;border-radius:8px;overflow:hidden;border:1px solid var(--line);margin-bottom:10px">
      <span style="background:var(--green);width:${pct(sum(po),tot)}%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700">${pct(sum(po),tot).toFixed(0)}%</span>
      <span style="background:var(--amber);width:${pct(sum(fz),tot)}%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700">${pct(sum(fz),tot)>=6?pct(sum(fz),tot).toFixed(0)+'%':''}</span>
      <span style="background:var(--red);width:${pct(sum(un),tot)}%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700">${pct(sum(un),tot)>=6?pct(sum(un),tot).toFixed(0)+'%':''}</span></div>
    <table class="evt"><tr><th>Method</th><th class="r">Records</th><th class="r">Spend</th><th>Confidence</th></tr>
    <tr><td>PO match</td><td class="r">${po.length}</td><td class="r">${fmt(sum(po))}</td><td><span class="conf c-high">0.97</span></td></tr>
    <tr><td>Vendor fuzzy</td><td class="r">${fz.length}</td><td class="r">${fmt(sum(fz))}</td><td><span class="conf c-med">0.55–0.85</span></td></tr>
    <tr><td>Unmatched</td><td class="r">${un.length}</td><td class="r">${fmt(sum(un))}</td><td><span class="conf c-low">0.00</span></td></tr></table></div>
  <div class="grid2">
    <div class="panel"><h2>Unmatched queue (maverick)</h2><p class="sub">No PO, no vendor match — surfaced, never hidden.</p><table class="evt"><tr><th>ID</th><th>Vendor</th><th class="r">Amount</th><th>Date</th></tr>${un.map(s=>`<tr><td>${s.id}</td><td>${esc(s.vendor)}</td><td class="r">${fmt(s.amount)}</td><td>${s.spendDate}</td></tr>`).join('')}</table></div>
    <div class="panel"><h2>Fuzzy links to review</h2><p class="sub">Matched on vendor similarity, not PO.</p><table class="evt"><tr><th>ID</th><th>Spend vendor</th><th>→ Contract</th><th>Conf.</th></tr>${fz.map(s=>`<tr><td>${s.id}</td><td>${esc(s.vendor)}</td><td>${esc(cById(s.contractId).vendor)}</td><td><span class="conf c-med">${s.confidence.toFixed(2)}</span></td></tr>`).join('')||'<tr><td colspan=4 class="note">None</td></tr>'}</table></div>
  </div>
  <div class="foot"><b>Match accuracy is the biggest risk to every number.</b> Confidence is shown on every record; low-confidence and unmatched spend is queued for review, not silently scored.</div>`);
}

/* ---------- SETTINGS ---------- */
function vSettings(){
  const s=STATE.settings;
  V(`<div class="panel" style="max-width:680px"><h2>Assumptions &amp; thresholds</h2><p class="sub">These drive every figure across the app.</p>
    <div class="formrow"><label>Maverick recapture rate <span class="note">${Math.round(s.recapture*100)}%</span></label><input type="range" id="sr" min="1" max="25" value="${Math.round(s.recapture*100)}"></div>
    <div class="formrow"><label>Unused-commit threshold <span class="note">${Math.round(s.unusedPct*100)}%</span></label><input type="range" id="su" min="5" max="40" value="${Math.round(s.unusedPct*100)}"></div>
    <div class="formrow"><label>Overspend threshold <span class="note">${Math.round(s.overspendPct*100)}%</span></label><input type="range" id="so" min="0" max="25" value="${Math.round(s.overspendPct*100)}"></div>
    <div class="formrow"><label>Renewal lookahead (days)</label><input type="number" id="sl" value="${s.lookahead}" step="15"></div>
    <div class="formrow"><label>As-of date</label><input type="date" id="sa" value="${s.asOf}"></div>
    <div class="note" style="margin-top:8px">Changing any value recomputes the whole model, including KPIs, opportunities and the sprint plan.</div></div>`);
  document.getElementById('sr').oninput=e=>{s.recapture=+e.target.value/100;render();};
  document.getElementById('su').oninput=e=>{s.unusedPct=+e.target.value/100;render();};
  document.getElementById('so').oninput=e=>{s.overspendPct=+e.target.value/100;render();};
  document.getElementById('sl').oninput=e=>{s.lookahead=+e.target.value||0;render();};
  document.getElementById('sa').onchange=e=>{s.asOf=e.target.value;render();};
}

/* ---------- NIRVANAI CHATBOT (global, available on every tab) ---------- */
function chatAsk(q){STATE.chat.log.push({q:q,a:answer(q)});renderChat();}
function renderChat(){
  const root=document.getElementById('nirvana-root');if(!root)return;const c=STATE.chat;
  if(!c.open){root.innerHTML='<button id="nv-launch" class="nv-launch" title="Ask NirvanAI">✦</button>';document.getElementById('nv-launch').onclick=()=>{c.open=true;renderChat();};return;}
  const sugg=['Review renewal alerts','Show contracts expiring this quarter','Show contracts with total contract value','Find contracts with yearly commits','Where can I save the most?','What is recoverable right now?'];
  const body=c.log.length
    ? '<div class="nv-msgs" id="nv-msgs">'+c.log.map(e=>'<div class="nv-q">'+esc(e.q)+'</div><div class="nv-a">'+e.a+'</div>').join('')+'</div>'
    : '<div class="nv-hero"><div class="nv-word">NirvanAI</div><div class="nv-greet">How can I help you today?</div></div><div class="nv-sugg">'+sugg.map(s=>'<div class="nv-s" data-q="'+esc(s)+'"><span class="nv-bell">🔔</span>'+s+'</div>').join('')+'</div>';
  root.innerHTML='<div class="nv-panel"><div class="nv-head"><div class="nv-logo">NirvanAI</div><button class="nv-x" id="nv-close">✕</button></div><div class="nv-body">'+body+'</div><div class="nv-foot"><div class="nv-ctx"><span>◎ Cost Intelligence</span><span>Mode: <b>Global</b></span></div><div class="nv-input"><input type="text" id="nv-in" placeholder="Ask NirvanAI anything…"><button id="nv-send">➤</button></div></div></div>';
  document.getElementById('nv-close').onclick=()=>{c.open=false;renderChat();};
  root.querySelectorAll('.nv-s').forEach(s=>s.onclick=()=>chatAsk(s.dataset.q));
  const inp=document.getElementById('nv-in'),send=()=>{const v=inp.value.trim();if(v)chatAsk(v);};
  document.getElementById('nv-send').onclick=send;inp.onkeydown=e=>{if(e.key==='Enter')send();};
  const m=document.getElementById('nv-msgs');if(m)m.scrollTop=m.scrollHeight;inp.focus();
}

render();
renderChat();
</script>
