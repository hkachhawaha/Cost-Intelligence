    <div class="kpi"><div class="mt">Recommended value</div><div class="mv">${fmtK(k.identified)}</div><div class="ms">across all findings</div></div></div>
  <div class="sectlbl">🔍 AI findings & anomalies</div>
  ${anomalies.map(o=>`<div class="find"><div class="fi" style="background:var(--red-bg);color:var(--red)">${o.icon}</div><div style="align-self:center"><div class="ft">${o.type} — ${esc(o.subject||'')}</div><div class="fd">${o.rationale}</div></div><div style="align-self:center;font-weight:800;margin-left:auto">${fmtK(o.impact)}</div></div>`).join('')}
  <div class="sectlbl">💡 Top recommendations</div>
  ${opps.slice(0,4).map(o=>`<div class="find"><div class="fi">${o.icon}</div><div style="align-self:center;flex:1"><div class="ft">${o.act} — ${esc(o.subject||'')}</div><div class="fd">${esc(o.action)}</div></div><div style="align-self:center;font-weight:800">${fmtK(o.impact)}</div></div>`).join('')}`);
  document.querySelectorAll('[data-ask]').forEach(e=>e.onclick=()=>{STATE.chat.open=true;STATE.chat.log.push({q:e.dataset.ask,a:answer(e.dataset.ask)});renderChat();});
}
/* ============ PORTFOLIO ============ */
function vPortfolio(){
  const opps=detect(),k=kpis(opps);const oppByC={};opps.forEach(o=>{if(o.contractId)oppByC[o.contractId]=(oppByC[o.contractId]||0)+o.impact;});
  const ent={};spend.forEach(s=>{const e=entityOf(s);(ent[e]=ent[e]||{entity:e,spend:0,matched:0,contracts:new Set(),opp:0}).spend+=s.amount;if(s.contractId){ent[e].matched+=s.amount;ent[e].contracts.add(s.contractId);}});
  contracts.forEach(c=>{if(ent[c.entity])ent[c.entity].opp+=(oppByC[c.id]||0);});
  const rows=Object.values(ent).sort((a,b)=>b.spend-a.spend);
  const invCount=new Set(spend.map(s=>s.invoice)).size;const vendCount=new Set(spend.map(canonVendor)).size;
  const byL1={};spend.forEach(s=>byL1[l1Of(catOf(s))]=(byL1[l1Of(catOf(s))]||0)+s.amount);
  const segs=Object.entries(byL1).sort((a,b)=>b[1]-a[1]).map(([n,v],i)=>({label:n,value:v,color:CATCOL[i%CATCOL.length]}));
  V(`<div class="grid g4" style="margin-bottom:16px"><div class="kpi"><div class="mt">Total spend</div><div class="mv">${fmtK(k.total)}</div><div class="ms">${spend.length} transactions</div></div>
    <div class="kpi"><div class="mt">Contracts</div><div class="mv">${contracts.length}</div><div class="ms">${contracts.filter(c=>c.status==='Active').length} active</div></div>
    <div class="kpi"><div class="mt">Invoices</div><div class="mv">${invCount}</div><div class="ms">${vendCount} vendors</div></div>
    <div class="kpi pp"><div class="mt">Identified opportunity</div><div class="mv">${fmtK(k.identified)}</div><div class="ms">${pct(k.identified,k.total).toFixed(1)}% of spend</div></div></div>
  <div class="grid g2"><div class="card"><div class="sectlbl" style="margin:0 0 10px">Spend by entity</div>${bars(rows.map(r=>[r.entity,r.spend]))}</div>
    <div class="card"><div class="sectlbl" style="margin:0 0 6px">Group spend mix</div><div style="display:flex;align-items:center;gap:18px;margin-top:8px"><div>${donut(segs,150,28)}</div><div style="flex:1">${segs.map(s=>`<div style="display:flex;align-items:center;gap:8px;font-size:12.5px;margin:6px 0"><span class="dot" style="background:${s.color}"></span>${esc(s.label)}<b style="margin-left:auto">${fmtK(s.value)}</b></div>`).join('')}</div></div></div></div>
  <div class="sectlbl">Entity scorecard</div>
  <div class="grid g3">${rows.map(r=>`<div class="card"><div style="font-weight:750;font-size:15px">${esc(r.entity)}</div><div style="display:flex;align-items:center;gap:14px;margin-top:10px"><div>${ring(pct(r.matched,r.spend),64,8,'var(--green)')}</div><div style="font-size:12.5px"><div style="color:var(--muted)">Spend</div><b style="font-size:15px">${fmtK(r.spend)}</b><div style="color:var(--muted);margin-top:4px">Opportunity</div><b style="color:var(--purple-d)">${r.opp?fmtK(r.opp):'—'}</b></div></div><div style="font-size:12px;color:var(--muted);margin-top:8px">${r.contracts.size} contracts · ${pct(r.matched,r.spend).toFixed(0)}% under management</div></div>`).join('')}</div>`);
}
/* ============ DATA QUALITY ============ */
function vQuality(){
  const po=spend.filter(s=>s.method==='PO'),fz=spend.filter(s=>s.method.startsWith('Vendor')),un=spend.filter(s=>!s.contractId),tot=sum(spend);
  const segs=[{label:'PO match',value:sum(po),color:'#0f9d58'},{label:'Vendor fuzzy',value:sum(fz),color:'#e07b1a'},{label:'Unmatched',value:sum(un),color:'#e0394b'}];
  V(`<div class="grid g2"><div class="card"><div class="sectlbl" style="margin:0 0 10px">Match coverage</div><div style="display:flex;align-items:center;gap:20px"><div>${donut(segs,150,28)}</div><div style="flex:1">${segs.map(s=>`<div style="display:flex;align-items:center;gap:8px;font-size:13px;margin:8px 0"><span class="dot" style="background:${s.color}"></span>${s.label}<b style="margin-left:auto">${fmtK(s.value)}</b></div>`).join('')}</div></div><div class="psub" style="margin:12px 0 0">Every savings figure inherits the confidence of the link beneath it.</div></div>
    <div class="card"><div class="sectlbl" style="margin:0 0 10px">🧭 Unmatched queue</div><div class="psub" style="margin:0 0 6px">No PO, no vendor match — surfaced, never hidden.</div>
      ${un.map(s=>`<div class="vrow"><div style="flex:1"><b style="font-size:13px">${esc(s.vendor)}</b><div style="font-size:12px;color:var(--muted)">${s.id} · ${s.spendDate}</div></div><div style="font-weight:800">${fmt(s.amount)}</div></div>`).join('')}</div></div>
  <div class="card" style="margin-top:16px"><div class="sectlbl" style="margin:0 0 10px">🟠 Fuzzy links to review</div>
    ${fz.map(s=>`<div class="vrow"><div style="flex:1"><b style="font-size:13px">${esc(s.vendor)}</b> <span style="color:var(--muted)">→ ${esc(cById(s.contractId).vendor)}</span></div><span class="conf c-med">conf ${s.confidence.toFixed(2)}</span><div style="font-weight:800">${fmt(s.amount)}</div></div>`).join('')||'<div class="empty">No fuzzy links.</div>'}</div>`);
}
/* ============ SETTINGS ============ */
function vSettings(){const s=STATE.settings;
  V(`<div class="card" style="max-width:640px"><div class="sectlbl" style="margin:0 0 6px">Assumptions</div><div class="psub" style="margin:0 0 14px">Everything recalculates as you change these.</div>
    <div class="formrow"><label>Maverick recapture rate <b style="color:var(--purple)">${Math.round(s.recapture*100)}%</b></label><input type="range" id="sr" min="1" max="25" value="${Math.round(s.recapture*100)}"></div>
    <div class="formrow"><label>Flag unused commit above <b style="color:var(--purple)">${Math.round(s.unusedPct*100)}%</b></label><input type="range" id="su" min="5" max="40" value="${Math.round(s.unusedPct*100)}"></div>
    <div class="formrow"><label>Flag overspend above <b style="color:var(--purple)">${Math.round(s.overspendPct*100)}%</b></label><input type="range" id="so" min="0" max="25" value="${Math.round(s.overspendPct*100)}"></div>
    <div class="formrow"><label>Renewal look-ahead (days)</label><input type="number" id="sl" value="${s.lookahead}" step="15" style="width:120px"></div>
    <div class="formrow"><label>As-of date</label><input type="date" id="sa" value="${s.asOf}"></div></div>`);
  document.getElementById('sr').oninput=e=>{s.recapture=+e.target.value/100;render();};document.getElementById('su').oninput=e=>{s.unusedPct=+e.target.value/100;render();};
  document.getElementById('so').oninput=e=>{s.overspendPct=+e.target.value/100;render();};document.getElementById('sl').oninput=e=>{s.lookahead=+e.target.value||0;render();};document.getElementById('sa').onchange=e=>{s.asOf=e.target.value;render();};
}
/* ============ NirvanaI chat ============ */
function chatAsk(q){STATE.chat.log.push({q:q,a:answer(q)});renderChat();}
function renderChat(){const root=document.getElementById('nirvana-root');if(!root)return;const c=STATE.chat;
  if(!c.open){root.innerHTML='<button id="nv-launch" class="nv-launch" title="Ask NirvanaI">✦</button>';document.getElementById('nv-launch').onclick=()=>{c.open=true;renderChat();};return;}
  const sugg=['Where can I save the most?','What auto-renews soon?','How much spend is off-contract?',"What's recoverable right now?"];
  const body=c.log.length?'<div class="nv-msgs" id="nv-msgs">'+c.log.map(e=>'<div class="nv-q">'+esc(e.q)+'</div><div class="nv-a">'+e.a+'</div>').join('')+'</div>':'<div class="nv-hero"><div class="nv-word">NirvanaI</div><div class="nv-greet">How can I help you today?</div></div>'+sugg.map(s=>'<div class="nv-s" data-q="'+esc(s)+'">✦ '+s+'</div>').join('');
  root.innerHTML='<div class="nv-panel"><div class="nv-head"><div class="nv-logo">NirvanaI</div><button class="nv-x" id="nv-close">✕</button></div><div class="nv-body">'+body+'</div><div class="nv-foot"><div class="nv-input"><input id="nv-in" placeholder="Ask anything about your spend…"><button id="nv-send">➤</button></div></div></div>';
  document.getElementById('nv-close').onclick=()=>{c.open=false;renderChat();};
  root.querySelectorAll('.nv-s').forEach(s=>s.onclick=()=>chatAsk(s.dataset.q));
  const inp=document.getElementById('nv-in'),send=()=>{const v=inp.value.trim();if(v)chatAsk(v);};
  document.getElementById('nv-send').onclick=send;inp.onkeydown=e=>{if(e.key==='Enter')send();};
  const m=document.getElementById('nv-msgs');if(m)m.scrollTop=m.scrollHeight;inp.focus();
}
document.getElementById('askbtn').onclick=()=>{STATE.chat.open=true;renderChat();};
render();renderChat();
</script>
</body>
</html>
